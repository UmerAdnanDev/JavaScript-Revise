<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>
  <style>
  
    .center , h2{
      display:flex;
      justify-content: center;
    }
    h2{
      font-size:7rem;margin:7px;color: rgb(156, 161, 158);
    }
    button{
      border:none;border-radius: 25px;color: white;background:linear-gradient(45deg,rgb(105, 105, 161),rgb(119, 202, 228));
      margin-right: 10px;padding: 10px 18px;font-size: 1.2rem;
    }
    .red{
      color:rgb(228, 55, 55);
    }
    .green{
      color: rgb(51, 163, 51);
    }
    .grey{
      color: rgb(156, 161, 158);
    }
  </style>
</head>
<body>
  <h2 class = "num">0</h2>
  <div class = "center">
    <button class = "plus" onclick ="Zero(+1)">+1</button><button onclick ="Zero()" class = "reset">reset</button><button onclick ="Zero(-1)" class = "minus">-1</button>
  </div>
  <script src="counter.js">
  </script>
</body>
</html>
